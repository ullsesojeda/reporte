<!DOCTYPE html>

<html>

<head>
    <title>Editar Usuario</title>

```
<meta
    name="viewport"
    content="width=device-width, initial-scale=1">

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
```

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container-fluid">

```
    <span class="navbar-brand">
        👤 Editar Usuario
    </span>

    <a
        href="{{ url_for('usuarios') }}"
        class="btn btn-danger">
        Volver
    </a>

</div>
```

</nav>

<div class="container mt-5">

```
<div class="row justify-content-center">

    <div class="col-12 col-md-8">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    Modificar Usuario #{{ usuario.id }}
                </h4>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Nombre Completo
                        </label>

                        <input
                            type="text"
                            name="nombre"
                            class="form-control"
                            value="{{ usuario.nombre }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Usuario
                        </label>

                        <input
                            type="text"
                            name="usuario"
                            class="form-control"
                            value="{{ usuario.usuario }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Nueva Contraseña
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control">

                        <small class="text-muted">
                            Deje este campo vacío si no desea cambiar la contraseña.
                        </small>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Rol
                        </label>

                        <select
                            name="rol"
                            class="form-select">

                            <option
                                value="Administrador"
                                {% if usuario.rol=="Administrador" %}
                                selected
                                {% endif %}>
                                Administrador
                            </option>

                            <option
                                value="Usuario"
                                {% if usuario.rol=="Usuario" %}
                                selected
                                {% endif %}>
                                Usuario
                            </option>

                        </select>

                    </div>

                    <div class="text-center">

                        <button
                            type="submit"
                            class="btn btn-success btn-lg">
                            💾 Guardar Cambios
                        </button>

                        <a
                            href="{{ url_for('usuarios') }}"
                            class="btn btn-secondary btn-lg">
                            Cancelar
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
```

</div>

</body>
</html>
