<!DOCTYPE html>
<html>
<head>
    <link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
    <title>Importar Excel</title>
</head>
</div>
<body>
<div class="container mt-4"></div>
<h2>Importar Gastos desde Excel</h2>

<form
    method="POST"
    enctype="multipart/form-data">

    <input
        type="file"
        name="archivo"
        accept=".xlsx"
        required>

    <br><br>

    <button type="submit">
        Importar
    </button>

</form>

<br>

<a href="{{ url_for('gastos') }}">
    Regresar
</a>

</body>
</html>
