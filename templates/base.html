<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>
        {% block titulo %}
        Control de Gastos
        {% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body{
            background:#f5f6fa;
        }

        .navbar-brand{
            font-weight:bold;
        }

        .card{
            border:none;
            border-radius:15px;
        }

        .btn{
            border-radius:10px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow">

    <div class="container-fluid">

        <a
            class="navbar-brand"
            href="{{ url_for('gastos') }}">
            💰 Control de Gastos
        </a>

        {% if current_user.is_authenticated %}

        <div>

            <span class="text-white me-3">
                👤 {{ current_user.nombre }}
            </span>

            <a
                href="{{ url_for('logout') }}"
                class="btn btn-danger btn-sm">
                Salir
            </a>

        </div>

        {% endif %}

    </div>

</nav>

<div class="container mt-4">

    {% block contenido %}
    {% endblock %}

</div>

</body>
</html>
