<!DOCTYPE html>
<html>
<head>
    <link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
    <title>Nuevo Gasto</title>
</head>
</div>
<body>
<div class="container mt-4"></div>
<h2>Nuevo Gasto</h2>

<form method="POST">

<p>
Fecha
<input type="date" name="fecha" required>
</p>

<p>
Pagado a
<input type="text" name="pagado_a">
</p>

<p>
Concepto
<input type="text" name="concepto">
</p>

<p>
Observaciones
<input type="text" name="observaciones">
</p>

<p>
Responsable

<select name="responsable">

<option>ULISES</option>
<option>TIMO</option>
<option>OTRO</option>

</select>

</p>

<p>
Importe
<input type="number"
step="0.01"
name="importe">
</p>

<button>
Guardar
</button>

</form>

</body>
</html>
