<!DOCTYPE html>

<html>

<head>
    <title>Nuevo Gasto</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
```
<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
```

</head>

<body class="bg-light">

<div class="container mt-5">

```
<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">
                    💰 Registrar Nuevo Gasto
                </h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="row">

                        <div class="col-md-4 mb-3">
                            <label class="form-label">
                                Fecha
                            </label>

                            <input
                                type="date"
                                name="fecha"
                                class="form-control"
                                required>
                        </div>

                        <div class="col-md-8 mb-3">
                            <label class="form-label">
                                Pagado a
                            </label>

                            <input
                                type="text"
                                name="pagado_a"
                                class="form-control"
                                required>
                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Concepto
                        </label>

                        <input
                            type="text"
                            name="concepto"
                            class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Observaciones
                        </label>

                        <textarea
                            name="observaciones"
                            class="form-control"
                            rows="3"></textarea>
                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Responsable
                            </label>

                            <select
                                name="responsable"
                                class="form-select">

                                <option>ULISES</option>
                                <option>TIMO</option>
                                <option>OTRO</option>

                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Importe
                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="importe"
                                class="form-control"
                                required>
                        </div>

                    </div>

                    <div class="text-center mt-4">

                        <button
                            type="submit"
                            class="btn btn-success btn-lg">
                            💾 Guardar
                        </button>

                        <a
                            href="{{ url_for('gastos') }}"
                            class="btn btn-secondary btn-lg">
                            Cancelar
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
```

</div>

</body>
</html>
