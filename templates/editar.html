<!DOCTYPE html>
<html>
<head>
    <title>Editar Gasto</title>
</head>
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
</div>
<body>
<div class="container mt-4"></div>
<h2>Editar Gasto</h2>

<form method="POST">

<p>
Fecha
<input
    type="date"
    name="fecha"
    value="{{ gasto.fecha.strftime('%Y-%m-%d') }}"
    required>
</p>

<p>
Pagado a
<input
    type="text"
    name="pagado_a"
    value="{{ gasto.pagado_a }}">
</p>

<p>
Concepto
<input
    type="text"
    name="concepto"
    value="{{ gasto.concepto }}">
</p>

<p>
Observaciones
<input
    type="text"
    name="observaciones"
    value="{{ gasto.observaciones }}">
</p>

<p>
Responsable

<select name="responsable">

<option value="ULISES"
{% if gasto.responsable=="ULISES" %}selected{% endif %}>
ULISES
</option>

<option value="TIMO"
{% if gasto.responsable=="TIMO" %}selected{% endif %}>
TIMO
</option>

<option value="OTRO"
{% if gasto.responsable=="OTRO" %}selected{% endif %}>
OTRO
</option>

</select>

</p>

<p>
Importe
<input
    type="number"
    step="0.01"
    name="importe"
    value="{{ gasto.importe }}">
</p>

<button type="submit">
Guardar Cambios
</button>

<a href="{{ url_for('gastos') }}">
Cancelar
</a>

</form>

</body>
</html>
