<!DOCTYPE html>
<html>

<head>
    <title>Nuevo Usuario</title>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container-fluid">

        <span class="navbar-brand">
            👤 Nuevo Usuario
        </span>

        <a
            href="{{ url_for('usuarios') }}"
            class="btn btn-danger">
            Volver
        </a>

    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-12 col-md-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        Registrar Nuevo Usuario
                    </h4>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Nombre Completo
                            </label>

                            <input
                                type="text"
                                name="nombre"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Usuario
                            </label>

                            <input
                                type="text"
                                name="usuario"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Contraseña
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Rol
                            </label>

                            <select
                                name="rol"
                                class="form-select"
                                required>

                                <option value="Usuario">
                                    Usuario
                                </option>

                                <option value="Administrador">
                                    Administrador
                                </option>

                            </select>

                        </div>

                        <div class="text-center">

                            <button
                                type="submit"
                                class="btn btn-success btn-lg">
                                💾 Guardar Usuario
                            </button>

                            <a
                                href="{{ url_for('usuarios') }}"
                                class="btn btn-secondary btn-lg">
                                Cancelar
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
